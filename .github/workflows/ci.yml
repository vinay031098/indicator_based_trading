name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # The Fyers SDK declares the obsolete `asyncio` PyPI backport as a
          # dependency, which shadows the stdlib and breaks installs. It MUST be
          # installed with --no-deps; its real runtime deps come from requirements.txt.
          pip install --no-deps fyers-apiv3==3.1.7

      - name: Ruff (lint + import order)
        run: ruff check .

      # Black runs as an advisory check. Pre-existing modules owned by other
      # workstreams are not yet fully black-formatted; this step reports drift
      # without blocking the build. Make it blocking once the tree is clean.
      - name: Black (format check, advisory)
        continue-on-error: true
        run: black --check --diff .

      # Mypy is intentionally lenient (ignore_missing_imports) and advisory.
      - name: Mypy (type check, advisory)
        continue-on-error: true
        run: mypy .

      - name: Pytest (with coverage)
        run: pytest -q --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validates the Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: indicator-based-trading:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
