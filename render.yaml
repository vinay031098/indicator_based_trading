# ─── Render.com Blueprint ───
# Deploy: connect the GitHub repo → Render auto-detects this file.
services:
  - type: web
    name: nifty50-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install --no-deps fyers-apiv3==3.1.7
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PRODUCTION
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DOMAIN
        value: belezabrasileiro.com
      - key: SECRET_KEY
        generateValue: true
      - key: DASHBOARD_USER
        value: Trader
      - key: DASHBOARD_PASSWORD_HASH
        value: "pbkdf2:sha256:600000$kEYZ2hUdiXCPoVla$eb274dbe6866a5a9342ebe433fb531971e61c5363f9dde87c59697b8a623cb50"
      - key: FYERS_APP_ID
        sync: false
      - key: FYERS_SECRET_ID
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nifty50-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nifty50-redis
          property: connectionString

  # Background worker for long analysis jobs (Task 12).
  - type: worker
    name: nifty50-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install --no-deps fyers-apiv3==3.1.7
    startCommand: python worker.py
    envVars:
      - key: PRODUCTION
        value: "1"
      - key: SECRET_KEY
        sync: false
      - key: FYERS_APP_ID
        sync: false
      - key: FYERS_SECRET_ID
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nifty50-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nifty50-redis
          property: connectionString

databases:
  - name: nifty50-db
    plan: free
